services:
  - type: web
    name: donjon-rouge
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: donjon-rouge-dashboard
    env: static
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: dashboard/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: worker
    name: donjon-rouge-bot
    env: node
    buildCommand: cd bot && npm install
    startCommand: cd bot && node index.js
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: COC_API_TOKEN
        sync: false
